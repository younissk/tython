site_name: Tython
site_description: Strict, explicit language docs and tooling reference.
site_url: https://younissk.github.io/tython/
repo_url: https://github.com/younissk/tython
repo_name: younissk/tython
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      media: "(prefers-color-scheme: light)"
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      media: "(prefers-color-scheme: dark)"
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started.md
      - Installation: installation.md
      - Quickstart: language/quickstart.md
  - Language:
      - Values and Bindings: language/values-and-bindings.md
      - Expressions: language/expressions.md
      - Scope: language/scope.md
      - Functions: language/functions.md
      - Functions and Blocks: language/functions-and-blocks.md
      - Enums: language/enums.md
      - Matrix: language/matrix.md
      - Records and Classes: language/records-and-classes.md
      - Errors: language/errors.md
  - Tooling:
      - CLI: tooling/cli.md
      - LSP: tooling/lsp.md
      - Vim and Neovim: tooling/vim-neovim.md
      - Formatter: tooling/formatter.md
  - Examples:
      - Overview: examples/index.md
      - Small Programs: examples/small-programs.md
      - Common Patterns: examples/common-patterns.md
  - Reference:
      - Parser Pipeline: reference/parser-pipeline.md
      - Diagnostic Schema: reference/diagnostic-schema.md
      - Error Codes: reference/error-codes.md
  - AI:
      - AI Coding Guide: ai/ai-coding-guide.md
      - Debugging Guide: ai/debugging-guide.md
