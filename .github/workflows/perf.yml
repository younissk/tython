name: Perf

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --locked --python 3.11

      - name: Run perf benchmark
        run: uv run python scripts/run_corpus.py bench --output .project/perf/corpus.json --json

      - name: Upload perf report
        uses: actions/upload-artifact@v4
        with:
          name: corpus-perf-report
          path: .project/perf/corpus.json
