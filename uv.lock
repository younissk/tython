source = { editable = "." }
dependencies = [
    { name = "pegen" },
    { name = "pytest" },
    { name = "rich" },
    { name = "ruff" },
    { name = "typer" },
]

[package.metadata]
requires-dist = [
    { name = "pegen", specifier = ">=0.3.0" },
    { name = "pytest", specifier = ">=9.0.3" },
    { name = "rich", specifier = ">=14.0.0" },
    { name = "ruff", specifier = ">=0.15.10" },
    { name = "typer", specifier = ">=0.12.3" },
]
